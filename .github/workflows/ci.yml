# CI: pytest unit + Playwright E2E (Chromium). Repo rădăcină = acest proiect.
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  LLM_MODE: disabled
  OPENAI_API_KEY: ci-placeholder-not-used
  ANONYMIZED_TELEMETRY: "False"

jobs:
  pytest-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements-dev.txt

      - name: Prepare local data dirs
        run: mkdir -p data/uploaded-logs data/vectorstore data/ingested-uploads

      - name: Pytest (fără tests/e2e — acolo e jobul Playwright)
        run: pytest tests/ -q --tb=short --ignore=tests/e2e

  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements-dev.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Playwright Chromium + system deps
        run: python -m playwright install --with-deps chromium

      - name: Prepare local data dirs
        run: mkdir -p data/uploaded-logs data/vectorstore data/ingested-uploads

      - name: Playwright E2E
        run: E2E=1 pytest tests/e2e -q --tb=short --tracing=retain-on-failure --video=retain-on-failure

      - name: Upload Playwright traces and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-failure
          path: test-results
          if-no-files-found: ignore
